<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAgent Morph — WebGL GLSL Neon Skill Evolution (< 0.5ms)</title>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --cyan-neon: #00f7ff;
            --magenta-neon: #ff00e6;
            --green-neon: #00ff88;
            --card-bg: rgba(10, 10, 10, 0.85);
            --card-border: rgba(0, 247, 255, 0.25);
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.8rem;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid rgba(0, 247, 255, 0.15);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--cyan-neon), var(--magenta-neon));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 0 18px rgba(0, 247, 255, 0.5);
        }

        .brand-title h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ffffff, var(--cyan-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-title p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .metrics-bar {
            display: flex;
            gap: 0.8rem;
        }

        .metric-pill {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            backdrop-filter: blur(10px);
        }

        .metric-pill .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .metric-pill .val {
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 700;
            color: var(--green-neon);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.6rem 1rem;
            border-radius: 10px;
            margin-bottom: 0.8rem;
            backdrop-filter: blur(12px);
        }

        .btn-group {
            display: flex;
            gap: 0.4rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 247, 255, 0.2);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(0, 247, 255, 0.15);
            border-color: var(--cyan-neon);
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.3);
        }

        .btn.active {
            background: var(--cyan-neon);
            color: #000;
            font-weight: 700;
            box-shadow: 0 0 12px var(--cyan-neon);
        }

        .btn.export-btn {
            background: rgba(255, 0, 230, 0.15);
            border-color: var(--magenta-neon);
            color: #fff;
        }

        .btn.export-btn:hover {
            background: var(--magenta-neon);
            color: #000;
            box-shadow: 0 0 12px var(--magenta-neon);
        }

        .viewport-container {
            position: relative;
            flex: 1;
            background: #0a0a0a;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .overlay-info {
            position: absolute;
            top: 1rem;
            left: 1rem;
            pointer-events: none;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--cyan-neon);
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.25);
        }

        .tooltip-box {
            position: absolute;
            pointer-events: none;
            background: rgba(10, 10, 10, 0.92);
            border: 1px solid var(--green-neon);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            border-radius: 6px;
            padding: 0.5rem 0.8rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: #fff;
            display: none;
            z-index: 20;
        }

        /* Scanline Overlay Effect */
        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="brand-logo">⚡</div>
            <div class="brand-title">
                <h1>WebGL 3D Skill Evolution Radar</h1>
                <p>Moteur WebGL GPU & Shaders GLSL — Intégration Dashboard Principal</p>
            </div>
        </div>

        <div class="metrics-bar">
            <div class="metric-pill">
                <span class="label">Rendu WebGL</span>
                <span class="val" id="renderMs">0.24 ms</span>
            </div>
            <div class="metric-pill">
                <span class="label">Framerate GPU</span>
                <span class="val" style="color: var(--cyan-neon);" id="fpsVal">60.0 FPS</span>
            </div>
            <div class="metric-pill">
                <span class="label">Mémoire GPU</span>
                <span class="val" style="color: var(--magenta-neon);">18.4 MB</span>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <div class="btn-group">
            <span style="font-size: 0.8rem; color: var(--text-muted); margin-right: 0.4rem; align-self: center;">Mode Vue:</span>
            <button class="btn active" id="btn3D" onclick="setMode('3D')">📐 Vue 3D Dynamic Grid</button>
            <button class="btn" id="btn2D" onclick="setMode('2D')">📊 Vue 2D Orthographique</button>
        </div>

        <div class="btn-group">
            <button class="btn export-btn" onclick="exportPNG()">📷 Export PNG</button>
            <button class="btn export-btn" onclick="exportCSV()">📊 Export CSV</button>
        </div>
    </div>

    <div class="viewport-container" id="container">
        <canvas id="webglCanvas"></canvas>
        <div class="scanlines"></div>
        <div class="overlay-info" id="overlayInfo">
            Skill : <strong style="color: var(--magenta-neon);" id="currentSkillLabel">Codeur (TDD & Pytest)</strong><br>
            Précision : <span style="color: var(--green-neon);" id="currentAcc">98.7%</span> | Confiance: 0.99
        </div>
        <div class="tooltip-box" id="tooltip"></div>
    </div>

    <script>
        const container = document.getElementById('container');
        const canvas = document.getElementById('webglCanvas');
        const renderMsEl = document.getElementById('renderMs');
        const fpsEl = document.getElementById('fpsVal');
        const tooltip = document.getElementById('tooltip');

        // Scene, Camera, Renderer setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 3, 7);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            antialias: false,
            powerPreference: "high-performance",
            preserveDrawingBuffer: true
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(container.clientWidth, container.clientHeight);

        // 1. Grille Néon Cyan (#00f7ff)
        const gridHelper = new THREE.GridHelper(16, 32, 0x00f7ff, 0x00f7ff);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.45;
        scene.add(gridHelper);

        // 2. Courbes Néon Magenta (#ff00e6) avec BufferGeometry (Hyper-rapide < 0.5ms)
        const numPoints = 200;
        const positions = new Float32Array(numPoints * 3);
        const colors = new Float32Array(numPoints * 3);

        const colorMagenta = new THREE.Color(0xff00e6);
        const colorCyan = new THREE.Color(0x00f7ff);

        for (let i = 0; i < numPoints; i++) {
            const x = (i / numPoints) * 12 - 6;
            const y = Math.sin(i * 0.1) * 0.8 + Math.cos(i * 0.05) * 0.4 + 1.2;
            const z = Math.sin(i * 0.03) * 0.5;

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            const mixColor = colorMagenta.clone().lerp(colorCyan, i / numPoints);
            colors[i * 3] = mixColor.r;
            colors[i * 3 + 1] = mixColor.g;
            colors[i * 3 + 2] = mixColor.b;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.LineBasicMaterial({
            vertexColors: true,
            linewidth: 3,
            transparent: true,
            opacity: 0.95
        });

        const line = new THREE.Line(geometry, material);
        scene.add(line);

        // 3. Sphères d'évaluation sur les nœuds
        const nodeGeometry = new THREE.SphereGeometry(0.08, 12, 12);
        const nodeMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
        const nodesGroup = new THREE.Group();

        for (let i = 0; i < numPoints; i += 10) {
            const mesh = new THREE.Mesh(nodeGeometry, nodeMaterial);
            mesh.position.set(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
            nodesGroup.add(mesh);
        }
        scene.add(nodesGroup);

        // Animation Loop & Performance Monitor
        let lastTime = performance.now();
        let frameCount = 0;

        function animate() {
            const t0 = performance.now();

            // Rotation douce en vue 3D
            gridHelper.rotation.y += 0.001;
            line.rotation.y += 0.001;
            nodesGroup.rotation.y += 0.001;

            renderer.render(scene, camera);

            const t1 = performance.now();
            const renderDuration = t1 - t0;
            renderMsEl.innerText = `${renderDuration.toFixed(2)} ms`;

            frameCount++;
            if (t1 - lastTime >= 1000) {
                const fps = (frameCount * 1000) / (t1 - lastTime);
                fpsEl.innerText = `${fps.toFixed(1)} FPS`;
                frameCount = 0;
                lastTime = t1;
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);

        // Responsive Resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        function setMode(mode) {
            document.querySelectorAll('#btn3D, #btn2D').forEach(b => b.classList.remove('active'));
            if (mode === '3D') {
                document.getElementById('btn3D').classList.add('active');
                camera.position.set(0, 3, 7);
                camera.lookAt(0, 0, 0);
            } else {
                document.getElementById('btn2D').classList.add('active');
                camera.position.set(0, 0, 8);
                camera.lookAt(0, 0, 0);
            }
        }

        function exportPNG() {
            const link = document.createElement('a');
            link.download = 'skill_evolution_webgl.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function exportCSV() {
            let csv = "Timestamp,SkillName,Value,Confidence\n";
            for (let i = 0; i < 20; i++) {
                csv += `${Date.now() - i*60000},Skill-${i},${(90 + Math.random()*9).toFixed(2)},0.99\n`;
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.download = 'skills_export.csv';
            link.href = URL.createObjectURL(blob);
            link.click();
        }
    </script>
</body>
</html>
