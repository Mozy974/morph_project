name: SuperAgent Morph CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Pytest Suite & Webhooks Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest Suite
        run: |
          PYTHONPATH=. pytest tests/ --tb=short

      - name: Test Slack & Discord Webhook Integration
        run: |
          python -c "from orchestrator.notifier import send_slack_notification, send_discord_notification; print('Slack:', send_slack_notification('CI Test')); print('Discord:', send_discord_notification('CI Test'))"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
