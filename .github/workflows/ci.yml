name: SuperAgent Morph CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Pytest & Multi-Version Matrix Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov bandit

      - name: Security Linting (Bandit)
        run: |
          bandit -r orchestrator/ -ll -ii --exclude orchestrator/memory/checkpoints_old || true

      - name: Run Pytest Suite with Coverage
        run: |
          PYTHONPATH=. pytest tests/ --cov=orchestrator --cov-report=xml --tb=short

      - name: Test Slack & Discord Webhooks Integration
        run: |
          python -c "from orchestrator.notifier import send_slack_notification, send_discord_notification; print('Slack Test:', send_slack_notification('CI Test')); print('Discord Test:', send_discord_notification('CI Test'))"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-python-${{ matrix.python-version }}
          path: coverage.xml
