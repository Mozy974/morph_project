name: ProgramBench CI — Automated Evaluation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  program_bench:
    name: Run ProgramBench & Verify Pass@1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Launch Docker Stack
        run: |
          docker compose up -d --build
          sleep 15

      - name: Run ProgramBench Evaluation Suite
        run: |
          python scripts/program_bench.py

      - name: Archive Benchmark Report
        uses: actions/upload-artifact@v4
        with:
          name: program-bench-report
          path: program_bench_results.md
