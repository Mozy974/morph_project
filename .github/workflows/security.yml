# .github/workflows/security.yml
name: Security Audit

on:
  push:
    branches: [ main, release/* ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    name: Continuous Security & Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit || true
          if [ -f package.json ]; then
            npm ci || npm install || true
          fi

      - name: Bandit Security Scan (Python)
        continue-on-error: true
        run: |
          bandit -r orchestrator/ -x tests/ -ll -ii || true

      - name: Pip Audit Scan
        continue-on-error: true
        run: |
          pip-audit --severity high || true

      - name: npm Audit Scan
        if: hashFiles('package.json') != ''
        continue-on-error: true
        run: |
          npm audit --audit-level critical || true


      - name: SonarQube Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Snyk Security Test
        continue-on-error: true
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high

      - name: Cache Benchmark & Concurrency Proof Scan
        run: |
          PYTHONPATH=. python benchmark_cache_systems.py
          PYTHONPATH=. pytest tests/test_cache_concurrency_proof.py -v

      - name: Build Docker Image for Trivy Scan
        run: |
          docker build -t superagent-morph:v1.4.3-rc2 -f Dockerfile . || docker build -t superagent-morph:v1.4.3-rc2 . || true

      - name: Trivy Container Image Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'superagent-morph:v1.4.3-rc2'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Upload Security & Performance Benchmark Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-and-cache-benchmark-reports
          path: |
            reports/cache_benchmark_metrics.json
            reports/cache_benchmark_metrics.csv
            rapport_*.md


