name: Compliance & Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compliance-check:
    name: EU AI Act, ISO 42001 & CNIL Compliance Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run Compliance Audit & Artifact Generator
        run: |
          python scripts/generate_compliance_report.py

      - name: Upload Compliance Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-audit-${{ github.sha }}
          path: |
            rapport_conformite_reglementaire_ia.md
            reports/rapport_conformite_externe.html
            reports/badges/
            reports/proofs/
          retention-days: 30
