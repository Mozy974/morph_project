groups:
  - name: superagent_slo_and_security_alerts
    rules:
      - alert: SuspiciousAccessAttemptDetected
        expr: sum(increase(superagent_suspicious_access_attempts_total[5m])) > 0
        for: 0m
        labels:
          severity: critical
          security: high
        annotations:
          summary: "Tentative d'accès suspecte détectée"
          description: "Une ou plusieurs tentatives d'accès avec jeton invalide, expiré ou signature altérée ont été bloquées."

      - alert: SLO_Latency_Breach
        expr: histogram_quantile(0.99, rate(superagent_task_duration_seconds_bucket[5m])) > 0.010
        for: 2m
        labels:
          severity: critical
          slo: latency_99p9
        annotations:
          summary: "SLA Latence dépassé (> 10ms p99)"
          description: "Le p99 de latence dépasse le seuil SLO de 10ms depuis plus de 2 minutes."

      - alert: SLO_CacheHitRatio_Breach
        expr: superagent_classifier_cache_hit_ratio < 0.95
        for: 5m
        labels:
          severity: warning
          slo: cache_hit_95
        annotations:
          summary: "SLO Cache Hit Ratio sous 95%"
          description: "Le taux de hit cache est tombé sous l'objectif de service de 95%."

      - alert: SLO_SecurityInvariant_Violation
        expr: superagent_security_invariant_violations_total > 0
        for: 0m
        labels:
          severity: page
          slo: zero_tolerance_security
        annotations:
          summary: "Violation d'Invariant de Sécurité Immuable"
          description: "Une tentative d'injection malveillante ou d'exfiltration de credential a été bloquée."
