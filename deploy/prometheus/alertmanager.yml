global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-slack-discord'
    - match:
        severity: warning
      receiver: 'warning-slack'

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/api/v1/alerts'

  - name: 'critical-slack-discord'
    slack_configs:
      - channel: '#sre-alerts-critical'
        send_resolved: true
        title: '🚨 [CRITICAL ALERT] {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: 'warning-slack'
    slack_configs:
      - channel: '#sre-alerts-warning'
        send_resolved: true
        title: '⚠️ [WARNING] {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
