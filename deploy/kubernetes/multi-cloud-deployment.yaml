apiVersion: apps/v1
kind: Deployment
metadata:
  name: superagent-morph-deployment
  namespace: superagent
  labels:
    app: superagent-morph
    tier: backend
    multi-cloud: enabled
spec:
  replicas: 3
  selector:
    matchLabels:
      app: superagent-morph
  template:
    metadata:
      labels:
        app: superagent-morph
    spec:
      containers:
        - name: superagent-container
          image: gcr.io/superagent-morph-prod/app:v13.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: streamlit
            - containerPort: 8000
              name: fastapi
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.superagent.svc.cluster.local:4317"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: superagent-morph-hpa
  namespace: superagent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: superagent-morph-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
