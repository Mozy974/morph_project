apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: latency-injection-experiment
  namespace: superagent-chaos
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: superagent-morph
  delay:
    latency: '100ms'
    jitter: '10ms'
  direction: to
  duration: '5m'
  scheduler:
    cron: '@every 2h'
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: redis-pod-kill-experiment
  namespace: superagent-chaos
spec:
  action: pod-kill
  mode: fixed
  value: '1'
  selector:
    labelSelectors:
      app: redis
  scheduler:
    cron: '@every 6h'
